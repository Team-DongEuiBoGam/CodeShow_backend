spring:
  datasource:
    url: jdbc:h2:mem:codeshow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: test-secret-key-for-jwt-signing-should-be-long-enough-123456
  access-token-expiration-ms: 3600000
