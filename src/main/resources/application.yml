server:
  port: ${PORT:8080} # 8080을 알맞은 포트로 변경할 것

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codeshow}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&sslmode=REQUIRED
    username: ${DB_USERNAME}  # 본인 DB 유저명
    password: ${DB_PASSWORD}  # 본인 DB 비밀번호
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql

jwt:
  secret: ${JWT_SECRET} # JWT 보안키 입력
  access-token-expiration-ms: 3600000

openai:
  api-key: ${OPENAI_API_KEY}  # OpenAI API 키 입력
  model: "gpt-4o-mini"