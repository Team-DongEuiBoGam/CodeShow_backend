spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:본인 DB명}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:본인 DB 아이디}
    password: ${DB_PASSWORD:본인 DB 패스워드}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql

jwt:
  secret: JWT 키
  access-token-expiration-ms: 3600000

logging:
  level:
    org.hibernate.SQL: debug

openai:
  api-key: "OpenAI API 키"
  model: "gpt-4o-mini"
