spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:DB Name}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:DB Username}
    password: ${DB_PASSWORD:DB Password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 3600000

logging:
  level:
    org.hibernate.SQL: debug

openai:
  api-key: ${OPENAI_API_KEY}
  model: "gpt-4o-mini"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
