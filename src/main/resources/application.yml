spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codeshow}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql

jwt:
  secret: change-this-secret-key-to-a-long-random-value-at-least-32-bytes
  access-token-expiration-ms: 3600000

logging:
  level:
    org.hibernate.SQL: debug
